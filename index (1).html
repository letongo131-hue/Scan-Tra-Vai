<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;min-height:100vh;padding:12px}
.app{max-width:860px;margin:0 auto}
h1{font-size:20px;font-weight:500;color:#1a1a1a;padding:12px 0 4px}
.sub{font-size:13px;color:#888;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:12px 14px}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500;color:#1a1a1a}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:18px;margin-bottom:14px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:9px;font-size:13px;border:0.5px solid #ddd;border-radius:8px;background:transparent;cursor:pointer;color:#666}
.tab.active{background:#e6f1fb;border-color:#185fa5;color:#185fa5;font-weight:500}
#video-wrap{position:relative;background:#111;border-radius:8px;overflow:hidden;width:100%;display:none}
#video-wrap.on{display:block}
video{width:100%;display:block;max-height:300px;object-fit:cover}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.frame{width:220px;height:140px;border:2.5px solid #fff;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4)}
.scan-line{position:absolute;left:50%;transform:translateX(-50%);width:200px;height:2px;background:#4CAF50;animation:sl 2s ease-in-out infinite}
@keyframes sl{0%,100%{top:28%}50%{top:72%}}
.status{text-align:center;padding:10px;font-size:13px;color:#666;min-height:36px}
.status.ok{color:#3b6d11;font-weight:500}
.status.err{color:#a32d2d}
.preview{background:#eaf3de;border:0.5px solid #97c459;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none}
.preview.on{display:block}
.preview-label{font-size:11px;color:#3b6d11;margin-bottom:3px}
.preview-val{font-size:16px;font-weight:500;font-family:monospace;color:#1a1a1a;word-break:break-all}
.weight-row{display:none;gap:10px;align-items:flex-end;margin-bottom:4px}
.weight-row.on{display:flex}
.field{flex:1}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px}
input[type=text],input[type=number]{width:100%;padding:10px 12px;font-size:15px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
input:focus{outline:none;box-shadow:0 0 0 2px #185fa5}
.w-field{flex:0 0 140px}
.btn{padding:10px 16px;border-radius:8px;border:0.5px solid #ccc;background:#fff;cursor:pointer;font-size:14px;color:#1a1a1a;white-space:nowrap}
.btn:active{opacity:0.8}
.btn.primary{background:#185fa5;border-color:#185fa5;color:#fff}
.btn.danger{color:#a32d2d;border-color:#f09595}
.btn.sm{padding:6px 12px;font-size:12px}
.manual{display:none}
.manual.on{display:block}
.manual .row{display:flex;gap:10px;align-items:flex-end}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px}
.table-head h2{font-size:15px;font-weight:500;color:#1a1a1a}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{padding:9px 10px;text-align:left;font-size:11px;font-weight:500;color:#888;background:#fafafa;border-bottom:0.5px solid #e0e0e0}
tbody td{padding:9px 10px;border-bottom:0.5px solid #f0f0f0;color:#1a1a1a;word-break:break-all}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafafa}
.mono{font-family:monospace;font-size:12px}
.empty{text-align:center;padding:36px;color:#aaa;font-size:13px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.bqr{background:#EEEDFE;color:#3C3489}
.bbar{background:#E1F5EE;color:#085041}
.bman{background:#F1EFE8;color:#444441}
.del{background:none;border:none;cursor:pointer;color:#aaa;font-size:14px;padding:2px 5px;border-radius:4px}
.del:hover{background:#fce;color:#a32d2d}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.actions .btn{flex:1;min-width:140px;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#2c2c2a;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;transition:transform 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
#start-btn{width:100%;padding:14px;font-size:16px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">
  <h1>Scan Log</h1>
  <div class="sub">Barcode &amp; QR scanner — works on any device</div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Items</div><div class="stat-value" id="s-count">0</div></div>
    <div class="stat"><div class="stat-label">Weight (kg)</div><div class="stat-value" id="s-weight">0.00</div></div>
    <div class="stat"><div class="stat-label">Total yards</div><div class="stat-value" id="s-yards">0.00</div></div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="setMode('camera')">Camera scan</button>
      <button class="tab" onclick="setMode('manual')">Manual entry</button>
    </div>

    <div id="video-wrap">
      <video id="video" playsinline autoplay muted></video>
      <div class="overlay"><div style="position:relative"><div class="frame"></div><div class="scan-line"></div></div></div>
    </div>

    <button class="btn primary" id="start-btn" onclick="startCamera()">Tap to start camera</button>

    <div class="status" id="status">Press the button above to activate camera</div>

    <div class="preview" id="preview">
      <div class="preview-label">Scanned successfully</div>
      <div class="preview-val" id="preview-val"></div>
    </div>

    <div class="weight-row" id="weight-row">
      <div class="field w-field">
        <label>Weight (kg)</label>
        <input type="number" id="w-input" placeholder="0.00" step="0.01" min="0" inputmode="decimal" onkeydown="if(event.key==='Enter')confirmEntry()">
      </div>
      <button class="btn primary" onclick="confirmEntry()">Add</button>
      <button class="btn" onclick="cancelScan()">Cancel</button>
    </div>

    <div class="manual" id="manual">
      <div class="row">
        <div class="field">
          <label>Barcode / QR</label>
          <input type="text" id="m-bc" placeholder="Type or paste barcode" onkeydown="if(event.key==='Enter')document.getElementById('m-wt').focus()">
        </div>
        <div class="field w-field">
          <label>Weight (kg)</label>
          <input type="number" id="m-wt" placeholder="0.00" step="0.01" min="0" inputmode="decimal" onkeydown="if(event.key==='Enter')addManual()">
        </div>
        <button class="btn primary" onclick="addManual()">Add</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="table-head">
      <h2>Scan records</h2>
      <button class="btn sm danger" onclick="clearAll()">Clear all</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th style="width:32px">#</th><th>Barcode / QR</th><th style="width:60px">Type</th><th style="width:80px">Weight</th><th style="width:70px">Yards</th><th style="width:60px">Time</th><th style="width:30px"></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" class="empty">No scans yet</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="printLog()">Print / PDF</button>
    <button class="btn" onclick="copyEmail()">Copy for email</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
const FACTOR = 3.5;
let records = [];
let pending = null;
let pendingType = null;
let reader = null;
let camActive = false;
let cooldown = false;
let mode = 'camera';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0)===(m==='camera')));
  document.getElementById('manual').classList.toggle('on', m==='manual');
  if(m==='manual'){
    stopCamera();
    document.getElementById('video-wrap').classList.remove('on');
    document.getElementById('start-btn').style.display='none';
    document.getElementById('status').textContent='';
    document.getElementById('m-bc').focus();
  } else {
    document.getElementById('start-btn').style.display='block';
    document.getElementById('status').textContent='Press the button above to activate camera';
  }
}

async function startCamera() {
  document.getElementById('start-btn').style.display='none';
  document.getElementById('status').textContent='Requesting camera access...';
  document.getElementById('status').className='status';
  try {
    const constraints = {
      video: {
        facingMode: {ideal:'environment'},
        width: {ideal:1280},
        height: {ideal:720}
      }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('video-wrap').classList.add('on');
    document.getElementById('status').textContent='Point camera at barcode or QR code';
    document.getElementById('status').className='status ok';
    camActive = true;
    startDecoding(video);
  } catch(e) {
    let msg = 'Camera access denied.';
    if(e.name==='NotFoundError') msg='No camera found on this device.';
    else if(e.name==='NotAllowedError') msg='Permission denied. Please allow camera in browser settings, then refresh.';
    else if(e.name==='NotReadableError') msg='Camera is in use by another app. Close other apps and try again.';
    document.getElementById('status').textContent=msg;
    document.getElementById('status').className='status err';
    document.getElementById('start-btn').style.display='block';
    document.getElementById('start-btn').textContent='Retry camera';
  }
}

function startDecoding(video) {
  if(typeof ZXing === 'undefined') { toast('Decoder not loaded, use manual entry'); return; }
  reader = new ZXing.BrowserMultiFormatReader();
  reader.decodeFromVideoElement(video, (result, err) => {
    if(result && !cooldown && !pending) {
      cooldown = true;
      setTimeout(()=>{ cooldown=false; },2500);
      const fmt = result.getBarcodeFormat ? result.getBarcodeFormat().toString() : '';
      handleScan(result.getText(), fmt.toLowerCase().includes('qr') ? 'QR' : 'Barcode');
    }
  });
}

function stopCamera() {
  if(reader){ try{ reader.reset(); }catch(e){} reader=null; }
  const v = document.getElementById('video');
  if(v.srcObject){ v.srcObject.getTracks().forEach(t=>t.stop()); v.srcObject=null; }
  camActive=false;
}

function handleScan(text, type) {
  pending = text;
  pendingType = type;
  document.getElementById('preview-val').textContent = text;
  document.getElementById('preview').classList.add('on');
  document.getElementById('weight-row').classList.add('on');
  document.getElementById('status').textContent='Code detected — enter weight and press Add';
  document.getElementById('status').className='status ok';
  setTimeout(()=>document.getElementById('w-input').focus(),100);
  toast('Scanned: '+text.substring(0,40));
}

function confirmEntry() {
  const w = parseFloat(document.getElementById('w-input').value);
  if(!pending){ toast('Scan a barcode first'); return; }
  if(isNaN(w)||w<=0){ toast('Enter a valid weight'); document.getElementById('w-input').focus(); return; }
  addRecord(pending, pendingType||'Barcode', w);
  cancelScan();
}

function cancelScan() {
  pending=null; pendingType=null;
  document.getElementById('preview').classList.remove('on');
  document.getElementById('weight-row').classList.remove('on');
  document.getElementById('w-input').value='';
  document.getElementById('status').textContent='Point camera at barcode or QR code';
  document.getElementById('status').className='status ok';
}

function addManual() {
  const bc = document.getElementById('m-bc').value.trim();
  const w = parseFloat(document.getElementById('m-wt').value);
  if(!bc){ toast('Enter a barcode'); document.getElementById('m-bc').focus(); return; }
  if(isNaN(w)||w<=0){ toast('Enter a valid weight'); document.getElementById('m-wt').focus(); return; }
  addRecord(bc,'Manual',w);
  document.getElementById('m-bc').value='';
  document.getElementById('m-wt').value='';
  document.getElementById('m-bc').focus();
}

function addRecord(barcode,type,weight) {
  const yards=parseFloat((weight*FACTOR).toFixed(2));
  records.unshift({id:Date.now(),barcode,type,weight,yards,time:new Date()});
  render(); updateStats();
  toast('Added — '+yards.toFixed(2)+' yards');
}

function deleteRecord(id){
  records=records.filter(r=>r.id!==id);
  render(); updateStats();
}

function clearAll(){
  if(!records.length) return;
  if(!confirm('Clear all '+records.length+' records?')) return;
  records=[]; render(); updateStats();
}

function render(){
  const tb=document.getElementById('tbody');
  if(!records.length){ tb.innerHTML='<tr><td colspan="7" class="empty">No scans yet</td></tr>'; return; }
  tb.innerHTML=records.map((r,i)=>`<tr>
    <td style="color:#aaa">${records.length-i}</td>
    <td class="mono">${esc(r.barcode)}</td>
    <td><span class="badge ${r.type==='QR'?'bqr':r.type==='Manual'?'bman':'bbar'}">${r.type}</span></td>
    <td>${r.weight.toFixed(2)}</td>
    <td style="font-weight:500">${r.yards.toFixed(2)}</td>
    <td style="color:#aaa;font-size:11px">${r.time.toLocaleTimeString()}</td>
    <td><button class="del" onclick="deleteRecord(${r.id})">x</button></td>
  </tr>`).join('');
}

function updateStats(){
  document.getElementById('s-count').textContent=records.length;
  document.getElementById('s-weight').textContent=records.reduce((s,r)=>s+r.weight,0).toFixed(2);
  document.getElementById('s-yards').textContent=records.reduce((s,r)=>s+r.yards,0).toFixed(2);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportCSV(){
  if(!records.length){ toast('No data'); return; }
  const rows=[['#','Barcode','Type','Weight (kg)','Yards','Time']];
  records.forEach((r,i)=>rows.push([records.length-i,r.barcode,r.type,r.weight.toFixed(2),r.yards.toFixed(2),r.time.toLocaleString()]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ScanLog_'+new Date().toISOString().slice(0,16).replace(/[T:]/g,'-')+'.csv';
  a.click();
  toast('CSV exported');
}

function printLog(){
  if(!records.length){ toast('No data'); return; }
  const tw=records.reduce((s,r)=>s+r.weight,0);
  const ty=records.reduce((s,r)=>s+r.yards,0);
  const rows=records.map((r,i)=>`<tr><td>${records.length-i}</td><td style="font-family:monospace">${esc(r.barcode)}</td><td>${r.type}</td><td>${r.weight.toFixed(2)}</td><td><b>${r.yards.toFixed(2)}</b></td><td>${r.time.toLocaleTimeString()}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Scan Log</title><style>body{font-family:Arial;padding:24px;font-size:13px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:7px 10px;text-align:left}th{background:#f5f5f5}.totals{margin-top:16px}</style></head><body><h2>Scan Log — ${new Date().toLocaleString()}</h2><table><thead><tr><th>#</th><th>Barcode/QR</th><th>Type</th><th>Weight(kg)</th><th>Yards</th><th>Time</th></tr></thead><tbody>${rows}</tbody></table><div class="totals"><b>Items:</b> ${records.length} &nbsp;|&nbsp; <b>Weight:</b> ${tw.toFixed(2)} kg &nbsp;|&nbsp; <b>Yards:</b> ${ty.toFixed(2)}</div></body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),400);
}

function copyEmail(){
  if(!records.length){ toast('No data'); return; }
  const tw=records.reduce((s,r)=>s+r.weight,0);
  const ty=records.reduce((s,r)=>s+r.yards,0);
  let t=`Scan Log — ${new Date().toLocaleString()}\nItems: ${records.length} | Weight: ${tw.toFixed(2)} kg | Yards: ${ty.toFixed(2)}\n\n`;
  records.forEach((r,i)=>{ t+=`${(records.length-i).toString().padStart(3)}. ${r.barcode.padEnd(24)} ${r.weight.toFixed(2).padStart(6)} kg  ${r.yards.toFixed(2).padStart(7)} yds  ${r.time.toLocaleTimeString()}\n`; });
  navigator.clipboard.writeText(t).then(()=>toast('Copied — paste into email')).catch(()=>toast('Copy failed'));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
